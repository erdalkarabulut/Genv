services:
  api:
    image: cryoflow-api:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cryoflow-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "5001:5001"
    networks:
      - smartready_oqlt-network

  frontend:
    image: cryoflow-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cryoflow-frontend
    restart: unless-stopped
    ports:
      - "6001:80"
    networks:
      - smartready_oqlt-network

networks:
  smartready_oqlt-network:
    external: true
