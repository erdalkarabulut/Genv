# PostgreSQL compose içinde değil; DATABASE_URL ile dış veritabanına bağlanın.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genv-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${DATABASE_URL:?set DATABASE_URL}
      ConnectionStrings__BaseDb: ${DATABASE_URL:?set DATABASE_URL}
    ports:
      - "8080:8080"
    networks:
      - genv-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: genv-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - genv-network

networks:
  genv-network:
    driver: bridge
