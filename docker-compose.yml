# PostgreSQL ve Redis ayrı çalıştırılmalı; bağlantı dizesini .env ile verin veya aşağıdaki varsayılanı kullanın (Docker Desktop: host makinedeki PG).
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genv-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-Host=host.docker.internal;Port=5432;Database=gen_v_api_db;Username=postgres;Password=postgres}
      ConnectionStrings__BaseDb: ${CONNECTION_STRING:-Host=host.docker.internal;Port=5432;Database=gen_v_api_db;Username=postgres;Password=postgres}
      CacheSettings__Enabled: "true"
      WebAPIConfiguration__APIDomain: "http://localhost/api"
      WebAPIConfiguration__AllowedOrigins__0: "http://localhost"
      WebAPIConfiguration__AllowedOrigins__1: "http://localhost:80"
      WebAPIConfiguration__AllowedOrigins__2: "http://localhost:5173"
      WebAPIConfiguration__AllowedOrigins__3: "http://127.0.0.1"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - genv-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: genv-frontend
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - genv-network

networks:
  genv-network:
    driver: bridge
